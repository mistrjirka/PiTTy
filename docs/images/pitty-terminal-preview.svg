<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">PiTTy terminal logo preview</title>
  <desc id="desc">A terminal-window preview of the cell-safe PiTTy PTY Tail mark.</desc>
  <rect width="960" height="520" rx="28" fill="#09090B"/>
  <rect x="1" y="1" width="958" height="518" rx="27" fill="none" stroke="#27272A" stroke-width="2"/>
  <circle cx="42" cy="38" r="8" fill="#F87171"/>
  <circle cx="68" cy="38" r="8" fill="#FACC15"/>
  <circle cx="94" cy="38" r="8" fill="#4ADE80"/>
  <text x="130" y="47" fill="#71717A" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">pitty — empty chat</text>

  <!-- Vector preview of the rounded box-drawing cell composition used by OpenTUI. -->
  <path
    d="M302 112H402V150H562V188H622V226H462V264H422V302H442V340H302"
    fill="none"
    stroke="#60A5FA"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"/>
  <rect x="282" y="98" width="28" height="28" rx="2" fill="#60A5FA"/>
  <rect x="282" y="326" width="28" height="28" rx="2" fill="#60A5FA"/>

  <text x="452" y="412" text-anchor="middle" fill="#FAFAFA" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="44" font-weight="700">PiTTy</text>
  <text x="452" y="451" text-anchor="middle" fill="#71717A" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">terminal-native frontend for Pi</text>
</svg>
