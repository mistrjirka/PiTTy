name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  source-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          node node_modules/bun/install.js
      - name: Validate core checks
        run: |
          npm run typecheck
          npm run test:unit
      - name: Validate version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          package="$(node -p "require('./package.json').version")"
          test "$tag" = "$package" || { echo "tag $tag does not match package $package" >&2; exit 1; }
      - name: Prepare release body
        id: release_body
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          notes=".github/release-notes/v${version}.md"
          if [[ "$version" == "0.5.4" && ! -f "$notes" ]]; then
            echo "Required curated release notes are missing: $notes" >&2
            exit 1
          fi
          if [[ -f "$notes" ]]; then
            cp "$notes" release-body.md
            echo "generate_release_notes=false" >> "$GITHUB_OUTPUT"
            echo "Using curated release body from $notes"
          else
            : > release-body.md
            echo "generate_release_notes=true" >> "$GITHUB_OUTPUT"
            echo "No curated release body for v$version; GitHub-generated notes remain the fallback"
          fi
      - name: Build source archives
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix="pitty-$version/" -o "pitty-$version.tar.gz" HEAD
          git archive --format=zip --prefix="pitty-$version/" -o "pitty-$version.zip" HEAD
          sha256sum "pitty-$version.tar.gz" "pitty-$version.zip" > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            pitty-*.tar.gz
            pitty-*.zip
            SHA256SUMS
          body_path: release-body.md
          generate_release_notes: ${{ steps.release_body.outputs.generate_release_notes == 'true' }}
